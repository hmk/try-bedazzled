version: 2

project_name: try-bedazzled

before:
  hooks:
    - go mod tidy
    - go test ./...

builds:
  - id: try
    main: ./cmd/try
    binary: try
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
      - -X github.com/hmk/try-bedazzled/internal/cli.Version={{.Version}}
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64

archives:
  - id: default
    formats:
      - tar.gz
    name_template: >-
      {{ .ProjectName }}_{{ .Os }}_{{ .Arch }}

checksum:
  name_template: checksums.txt
  algorithm: sha256

notarize:
  macos:
    - enabled: '{{ isEnvSet "MACOS_SIGN_P12" }}'
      ids:
        - try
      sign:
        certificate: "{{ .Env.MACOS_SIGN_P12 }}"
        password: "{{ .Env.MACOS_SIGN_PASSWORD }}"
      notarize:
        issuer_id: "{{ .Env.MACOS_NOTARY_ISSUER_ID }}"
        key_id: "{{ .Env.MACOS_NOTARY_KEY_ID }}"
        key: "{{ .Env.MACOS_NOTARY_KEY }}"
        wait: true
        timeout: 20m

nfpms:
  - id: packages
    package_name: try-bedazzled
    vendor: hmk
    homepage: https://github.com/hmk/try-bedazzled
    maintainer: hmk
    description: A beautiful, themeable directory manager for try experiments
    license: BSD-3-Clause
    formats:
      - deb
      - rpm
    bindir: /usr/bin

homebrew_casks:
  - name: try-bedazzled
    binaries:
      - try
    repository:
      owner: hmk
      name: homebrew-tap
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: https://github.com/hmk/try-bedazzled
    description: A beautiful, themeable directory manager for try experiments
    license: BSD-3-Clause
    commit_author:
      name: goreleaserbot
      email: bot@goreleaser.com
    commit_msg_template: "chore(cask): bump try-bedazzled to {{ .Tag }}"
    caveats: |
      To enable the `try` shell function (so Enter actually `cd`s your shell),
      add this line to your shell config:

          # bash / zsh
          eval "$(try init)"

          # fish
          try init | source

      Then restart your shell.

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

release:
  github:
    owner: hmk
    name: try-bedazzled
  draft: false
  prerelease: auto
  name_template: "v{{.Version}}"
