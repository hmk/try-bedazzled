name: Semantic PR

on:
  pull_request_target:
    types: [opened, edited, synchronize, reopened]

permissions:
  pull-requests: read
  statuses: write

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            perf
            refactor
            docs
            test
            build
            ci
            chore
            revert
          requireScope: false
          subjectPattern: ^(?!.*[A-Z]{3,}).+$
          subjectPatternError: |
            The subject "{subject}" contains an ALL-CAPS acronym. Either lower-case it
            or use it sparingly so the commit log reads well.
          wip: true
