name: Feature request
description: Suggest a new capability or enhancement
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What are you trying to do? What's getting in your way today?
      placeholder: |
        When I have 500+ try directories, scrolling to find the right one…
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What you'd like to see added or changed
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about and why they didn't fit
    validations:
      required: false

  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: Anything else — mockups, references, links to similar features in other tools
    validations:
      required: false
