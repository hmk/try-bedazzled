# bedazzled — catppuccin mocha palette with rainbow gradient flair
# The default try theme: catppuccin pastels everywhere, with rainbow search
# rules, shifting cursor hues, rainbow fuzzy hits, and a rainbow gradient
# background on the selected row. For a louder all-pink variant see `rainbow`.

[colors]
accent  = "#CBA6F7"   # Catppuccin Mauve — used when rainbow isn't active
dim     = "#6C7086"   # Overlay0
text    = "#CDD6F4"   # Text
match   = "#F9E2AF"   # Yellow (overridden per-char when rainbow = true)
danger  = "#F38BA8"   # Red
success = "#A6E3A1"   # Green
bg      = ""          # Empty = transparent (terminal default)

[symbols]
cursor  = "▸"
created = "✦"
deleted = "✗"
folder  = "📂"

[layout]
max_visible  = 12
show_icons   = true
show_date    = "right"
show_time    = true
show_score   = true
columns      = ["icon", "date", "name"]
search_style   = "bordered"
rainbow        = true         # rainbow search rules, cursor hues, fuzzy hits
selected_row_bg = "#45475A"   # Catppuccin Surface1 — solid BG on selected row
