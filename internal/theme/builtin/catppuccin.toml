# try-bedazzled catppuccin (mocha) theme
# Soothing pastel colors — https://catppuccin.com

[colors]
accent  = "#CBA6F7"   # Mauve
dim     = "#6C7086"   # Overlay0
text    = "#CDD6F4"   # Text
match   = "#F9E2AF"   # Yellow
danger  = "#F38BA8"   # Red
success = "#A6E3A1"   # Green
bg      = ""

[symbols]
cursor  = "▸"
created = "✦"
deleted = "✗"
folder  = "📂"

[layout]
max_visible  = 12
show_icons   = true
show_date    = "right"
show_time    = true
columns      = ["icon", "date", "name", "time"]
search_style = "bordered"
selected_bg  = true
