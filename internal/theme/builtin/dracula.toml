# try-bedazzled dracula theme
# Dark and colorful — https://draculatheme.com

[colors]
accent  = "#BD93F9"   # Purple
dim     = "#6272A4"   # Comment
text    = "#F8F8F2"   # Foreground
match   = "#F1FA8C"   # Yellow
danger  = "#FF5555"   # Red
success = "#50FA7B"   # Green
bg      = ""

[symbols]
cursor  = "▸"
created = "✦"
deleted = "✗"
folder  = "📂"

[layout]
max_visible  = 12
show_icons   = true
show_date    = "right"
show_time    = true
show_score   = true
columns      = ["icon", "date", "name"]
search_style = "bordered"
selected_row_bg = "#44475A"  # Dracula's Current Line
